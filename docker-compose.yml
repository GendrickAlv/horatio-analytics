services:
  postgres:
    image: postgres:16-alpine
    container_name: horatio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: horatio
      POSTGRES_PASSWORD: horatio
      POSTGRES_DB: horatio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U horatio -d horatio"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: horatio-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://horatio:horatio@postgres:5432/horatio
      LOG_LEVEL: info
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  postgres_data:
